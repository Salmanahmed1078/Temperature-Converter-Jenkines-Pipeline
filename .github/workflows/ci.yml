name: Node CI - Temperature Converter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci

      - name: Build (simulate)
        run: npm run build

      - name: Package artifact
        run: |
          mkdir -p build
          echo "App version: GA-${{ github.run_number }}" > build/version.txt
          zip -r build_GA_${{ github.run_number }}.zip build || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build_GA_${{ github.run_number }}
          path: |
            build_GA_${{ github.run_number }}.zip
            build/**


